{% set name = "crystal-toolkit" %}
{% set version = "2025.7.31" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/crystal_toolkit-{{ version }}.tar.gz
  sha256: e031cdb0ef6fd9951cff94a2adb22cc77b77517780ded8491b69f9e46a3bd74b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=45
    - setuptools-scm >=6.2,<8
    - jupyter_packaging
    - pip
  run:
    - python >=3.9
    - crystaltoolkit-extension
    - dash-mp-components >=0.4.38
    - dash >=2.11.0
    - flask-caching
    - frozendict
    - pymatgen
    - scikit-image
    - scikit-learn
    - shapely
    - webcolors
    - pydantic-settings
    - mp-api
    - jupyterlab >=3

test:
  imports:
    - crystal_toolkit
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/materialsproject/crystaltoolkit
  summary: Crystal Toolkit is a web app framework from the Materials Project
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlab-extension/LICENSE

extra:
  recipe-maintainers:
    - awvwgk
